<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${chapter_title} | ${work_title}</title>
  <style>
    :root { color-scheme: light; --ink: #25211d; --muted: #746d64; --paper: #fffdf8; --accent: #9f5438; --line: #ded7cb; }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: #f2eee6; font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; line-height: 1.8; }
    a { color: inherit; text-decoration-thickness: .08em; text-underline-offset: .2em; }
    .page { width: min(48rem, calc(100% - 2rem)); margin: clamp(1rem, 5vw, 4rem) auto; padding: clamp(1.5rem, 6vw, 4.5rem); background: var(--paper); box-shadow: 0 1rem 3rem rgb(51 42 32 / 10%); }
    .eyebrow { margin: 0; color: var(--accent); font: 700 .8rem/1.4 system-ui, sans-serif; letter-spacing: .16em; text-transform: uppercase; }
    h1 { margin: .35rem 0 1rem; font-size: clamp(2rem, 7vw, 4rem); line-height: 1.2; letter-spacing: .03em; }
    .goal { margin: 0 0 3rem; color: var(--muted); }
    h2 { margin: 0 0 1rem; font-size: 1rem; font-family: system-ui, sans-serif; letter-spacing: .12em; }
    .sections { margin: 0; padding: 0; list-style: none; border-top: 1px solid var(--line); }
    .sections a { display: grid; grid-template-columns: 3.5rem 1fr; gap: 1rem; padding: 1.15rem .25rem; border-bottom: 1px solid var(--line); text-decoration: none; }
    .sections a:hover, .sections a:focus-visible { color: var(--accent); }
    .section-no { color: var(--muted); font-family: system-ui, sans-serif; font-size: .8rem; letter-spacing: .08em; }
    nav { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; margin-top: 3rem; padding-top: 1.25rem; border-top: 1px solid var(--line); font-family: system-ui, sans-serif; font-size: .9rem; }
    .next { text-align: right; }
    @media (max-width: 35rem) { .page { width: 100%; margin: 0; min-height: 100vh; box-shadow: none; } }
  </style>
</head>
<body>
  <main class="page">
    <p class="eyebrow">${chapter_label}</p>
    <h1>${chapter_title}</h1>
    <p class="goal">${chapter_goal}</p>
    <section aria-labelledby="section-list-title">
      <h2 id="section-list-title">この章の節</h2>
      <ol class="sections">${section_links}</ol>
    </section>
    <nav aria-label="章ナビゲーション">
      <span class="previous">${previous_chapter_link}</span>
      <a href="${index_href}">目次へ戻る</a>
      <span class="next">${next_chapter_link}</span>
    </nav>
  </main>
</body>
</html>
