<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${work_title}</title>
  <style>
    :root { color-scheme: light; --ink: #25211d; --muted: #746d64; --paper: #fffdf8; --accent: #9f5438; --line: #ded7cb; }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: #f2eee6; font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; line-height: 1.8; }
    a { color: inherit; text-decoration-thickness: .08em; text-underline-offset: .2em; }
    .page { width: min(52rem, calc(100% - 2rem)); margin: clamp(1rem, 5vw, 4rem) auto; padding: clamp(1.5rem, 6vw, 4.5rem); background: var(--paper); box-shadow: 0 1rem 3rem rgb(51 42 32 / 10%); }
    .eyebrow { margin: 0; color: var(--accent); font: 700 .8rem/1.4 system-ui, sans-serif; letter-spacing: .16em; }
    h1 { margin: .35rem 0 1rem; font-size: clamp(2.2rem, 8vw, 4.5rem); line-height: 1.2; }
    .logline { margin: 0 0 3.5rem; color: var(--muted); }
    .chapters { display: grid; gap: 2rem; margin: 0; padding: 0; list-style: none; }
    .chapter { padding-top: 1.5rem; border-top: 1px solid var(--line); }
    .chapter h2 { margin: 0 0 .75rem; font-size: 1.4rem; }
    .chapter h2 a { text-decoration: none; }
    .chapter h2 a:hover, .chapter h2 a:focus-visible { color: var(--accent); }
    .sections { display: grid; gap: .4rem; margin: 0; padding-left: 1.5rem; }
    .sections a { color: var(--muted); }
    @media (max-width: 35rem) { .page { width: 100%; margin: 0; min-height: 100vh; box-shadow: none; } }
  </style>
</head>
<body>
  <main class="page">
    <p class="eyebrow">目次</p>
    <h1>${work_title}</h1>
    <p class="logline">${logline}</p>
    <nav aria-label="目次"><ol class="chapters">${chapter_links}</ol></nav>
  </main>
</body>
</html>
