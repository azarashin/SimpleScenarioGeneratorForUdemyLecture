<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${section_title} | ${work_title}</title>
  <style>
    :root { color-scheme: light; --ink: #25211d; --muted: #746d64; --paper: #fffdf8; --accent: #9f5438; --line: #ded7cb; }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: #f2eee6; font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; line-height: 1.9; }
    a { color: inherit; text-decoration-thickness: .08em; text-underline-offset: .2em; }
    .page { width: min(48rem, calc(100% - 2rem)); margin: clamp(1rem, 5vw, 4rem) auto; padding: clamp(1.5rem, 6vw, 4.5rem); background: var(--paper); box-shadow: 0 1rem 3rem rgb(51 42 32 / 10%); }
    .work-title { margin: 0 0 2.5rem; color: var(--muted); font-size: .9rem; }
    .eyebrow { margin: 0; color: var(--accent); font: 700 .8rem/1.4 system-ui, sans-serif; letter-spacing: .12em; }
    h1 { margin: .4rem 0 2.5rem; font-size: clamp(1.8rem, 6vw, 3.25rem); line-height: 1.3; }
    .story > * { margin: 0 0 1.5rem; }
    .narration { text-align: justify; }
    .dialogue-row { display: grid; grid-template-columns: 4.5rem 1fr; gap: 1rem; align-items: center; padding: 1rem; background: #f8f3ea; border-left: .2rem solid var(--accent); }
    .dialogue-row img, .portrait-placeholder { width: 4.5rem; aspect-ratio: 1; object-fit: cover; border-radius: 50%; background: var(--line); }
    .portrait-placeholder { display: grid; place-items: center; color: var(--muted); font: 700 1.1rem/1 system-ui, sans-serif; }
    .speaker { display: block; margin-bottom: .15rem; color: var(--accent); font: 700 .82rem/1.5 system-ui, sans-serif; }
    .dialogue-line { margin: 0; white-space: pre-wrap; }
    nav { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; margin-top: 3.5rem; padding-top: 1.25rem; border-top: 1px solid var(--line); font-family: system-ui, sans-serif; font-size: .85rem; }
    .next { text-align: right; }
    @media (max-width: 35rem) { .page { width: 100%; margin: 0; min-height: 100vh; box-shadow: none; } .dialogue-row { grid-template-columns: 3.5rem 1fr; } .dialogue-row img, .portrait-placeholder { width: 3.5rem; } nav { grid-template-columns: 1fr 1fr; } .chapter-home { grid-column: 1 / -1; grid-row: 1; text-align: center; } }
  </style>
</head>
<body>
  <main class="page">
    <p class="work-title"><a href="${index_href}">${work_title}</a></p>
    <header>
      <p class="eyebrow">${chapter_label} / ${section_label}</p>
      <h1>${section_title}</h1>
    </header>
    <article class="story">${narrative_blocks}</article>
    <nav aria-label="節ナビゲーション">
      <span class="previous">${previous_link}</span>
      <a class="chapter-home" href="${chapter_href}">章トップ</a>
      <span class="next">${next_link}</span>
    </nav>
  </main>
</body>
</html>
